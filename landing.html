<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 40px;
        }

        /* Time Display */
        .time-section {
            margin-bottom: 60px;
        }

        .main-time {
            font-size: 120px;
            font-weight: 200;
            letter-spacing: -4px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
        }

        .date {
            font-size: 20px;
            opacity: 0.9;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Time Zones */
        .timezones {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .timezone {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .timezone-time {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 4px;
        }

        .timezone-label {
            font-size: 13px;
            opacity: 0.8;
        }

        /* Greeting */
        .greeting {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 60px;
            opacity: 0.95;
        }

        /* Quick Links */
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 140px;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .link-icon {
            font-size: 24px;
        }

        .link-text {
            font-size: 16px;
            font-weight: 400;
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            color: white;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-time {
                font-size: 80px;
            }
            .greeting {
                font-size: 24px;
            }
            .quick-links {
                flex-direction: column;
                align-items: center;
            }
            .link-item {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="time-section">
            <div class="main-time" id="time">00:00</div>
            <div class="date" id="date">Loading...</div>
        </div>

        <div class="timezones">
            <div class="timezone">
                <div class="timezone-time" id="london-time">00:00</div>
                <div class="timezone-label">London</div>
            </div>
            <div class="timezone">
                <div class="timezone-time" id="la-time">00:00</div>
                <div class="timezone-label">Los Angeles</div>
            </div>
            <div class="timezone">
                <div class="timezone-time" id="tokyo-time">00:00</div>
                <div class="timezone-label">Tokyo</div>
            </div>
            <div class="timezone">
                <div class="timezone-time" id="sydney-time">00:00</div>
                <div class="timezone-label">Sydney</div>
            </div>
        </div>

        <div class="greeting" id="greeting">Good day</div>

        <div class="quick-links">
            <a href="https://isengard.amazon.com" class="link-item" target="_blank" rel="noopener noreferrer">
                <span class="link-icon">🔐</span>
                <span class="link-text">Isengard</span>
            </a>
        </div>
    </div>

    <button class="settings-btn" onclick="alert('Settings coming soon!')">⚙️</button>

    <script>
        // Time and date update
        function updateTime() {
            const now = new Date();
            
            // Main time (local)
            const timeStr = now.toLocaleTimeString('en-GB', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            document.getElementById('time').textContent = timeStr;
            
            // Date
            const dateStr = now.toLocaleDateString('en-GB', { 
                weekday: 'long', 
                day: 'numeric',
                month: 'long'
            });
            document.getElementById('date').textContent = dateStr;
            
            // Time zones
            document.getElementById('london-time').textContent = 
                now.toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    timeZone: 'Europe/London'
                });
            
            document.getElementById('la-time').textContent = 
                now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    timeZone: 'America/Los_Angeles'
                });
            
            document.getElementById('tokyo-time').textContent = 
                now.toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    timeZone: 'Asia/Tokyo'
                });
            
            document.getElementById('sydney-time').textContent = 
                now.toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    timeZone: 'Australia/Sydney'
                });
            
            // Greeting
            const hour = now.getHours();
            let greetingText = 'Good ';
            if (hour < 12) greetingText += 'morning';
            else if (hour < 18) greetingText += 'afternoon';
            else greetingText += 'evening';
            document.getElementById('greeting').textContent = greetingText;
        }

        // Initial update
        updateTime();

        // Update every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
